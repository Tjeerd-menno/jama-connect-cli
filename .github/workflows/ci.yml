name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore JamaConnect.slnx

      - name: Build
        run: dotnet build JamaConnect.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test JamaConnect.slnx --no-build --configuration Release --verbosity normal

  native-aot:
    name: Native AOT (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            executable: jama-connect
          - os: windows-latest
            rid: win-x64
            executable: jama-connect.exe
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish Native AOT
        shell: pwsh
        run: >
          dotnet publish src/JamaConnect.Cli/JamaConnect.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output artifacts/native/${{ matrix.rid }}

      - name: Verify native executable
        shell: pwsh
        run: ./artifacts/native/${{ matrix.rid }}/${{ matrix.executable }} --help

      - name: Upload native executable
        uses: actions/upload-artifact@v4.6.2
        with:
          name: jama-connect-${{ matrix.rid }}
          path: artifacts/native/${{ matrix.rid }}/${{ matrix.executable }}
          if-no-files-found: error
