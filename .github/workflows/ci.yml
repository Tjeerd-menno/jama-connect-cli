name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore JamaConnect.slnx

      - name: Build
        run: dotnet build JamaConnect.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test JamaConnect.slnx --no-build --configuration Release --verbosity normal
